# render.yaml — Render Blueprint Specification for CG Forecast
services:
  # 1. FastAPI Machine Learning Service
  - type: web
    name: cg-forecast-ml
    env: python
    buildCommand: pip install -r ml/requirements.txt
    startCommand: cd ml && uvicorn service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: congregate-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.8

  # 2. Express Backend & React Frontend Web Service
  - type: web
    name: cg-forecast-app
    env: node
    plan: free
    # Cloud Build Cycle: Translate Prisma to Postgres, compile React, and generate Postgres client in their correct directories
    buildCommand: node server/prepare-prisma.js && cd server && npm install && npx prisma generate && cd ../client && npm install && npm run build
    # Cloud Boot Cycle: Deploy database tables, run initial presentation seed data, and start Express server from the server folder
    startCommand: cd server && npx prisma db push --accept-data-loss && npx prisma db seed && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: congregate-db
          property: connectionString
      - key: ML_SERVICE_URL
        value: http://cg-forecast-ml:10000
      - key: PORT
        value: 3001

databases:
  # 3. Free Tier PostgreSQL Database
  - name: congregate-db
    databaseName: congregate
    user: congregate_user
    plan: free
